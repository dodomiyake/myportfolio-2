services:
  - type: web
    name: myportfolio-2
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: RESEND_API_KEY
        sync: false
      - key: CONTACT_FROM_EMAIL
        sync: false
      - key: CONTACT_TO_EMAIL
        sync: false
